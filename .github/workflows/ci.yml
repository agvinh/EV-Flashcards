name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore EV-Flashcards.csproj

      - name: Build
        run: dotnet build EV-Flashcards.csproj --configuration Release --no-restore

      - name: Validate default vocabulary data in wwwroot
        run: |
          test -d wwwroot/data
          test -f wwwroot/data/flashcards_vocab.tsv
